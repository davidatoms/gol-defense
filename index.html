<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conway's Game of Life</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      width: 100%;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar h1 {
      font-size: 13px;
      letter-spacing: 0.15em;
      color: #555;
      text-transform: uppercase;
      margin-right: 4px;
    }

    button {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ccc;
      font-family: monospace;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }

    button:hover { background: #2a2a2a; border-color: #555; }
    button.active { background: #1a3a1a; border-color: #3a7a3a; color: #6d6; }

    .layer-btn { padding: 3px 8px; font-size: 11px; }
    .layer-btn.active { background: #1a2a3a; border-color: #3a6aaa; color: #6af; }

    #sep { width: 1px; height: 20px; background: #2a2a2a; }

    label { font-size: 12px; color: #555; }

    input[type=range] {
      accent-color: #3a7a3a;
      width: 80px;
    }

    select {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ccc;
      font-family: monospace;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 3px;
      cursor: pointer;
    }

    #stats {
      margin-left: auto;
      font-size: 11px;
      color: #444;
      display: flex;
      gap: 16px;
    }

    #stats span { color: #666; }
    #stats b { color: #888; }

    canvas {
      display: block;
      cursor: crosshair;
      flex: 1;
    }

    #seq-panel {
      width: 100%;
      background: #0c0c0c;
      border-bottom: 1px solid #1a1a1a;
      padding: 4px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      font-size: 11px;
      color: #555;
    }

    .seq-btn {
      font-size: 10px;
      padding: 2px 10px;
      border-radius: 2px;
      cursor: pointer;
      font-family: monospace;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #666;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      letter-spacing: 0.05em;
    }

    .seq-btn[data-state="wall"] { background: #2a1500; border-color: #ff6600; color: #ff6600; }
    .seq-btn[data-state="null"] { background: #141420; border-color: #6666aa; color: #aaaacc; }

    #box-panel {
      width: 100%;
      background: #0e0e0e;
      border-bottom: 1px solid #1e1e1e;
      padding: 4px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      min-height: 0;
      font-size: 11px;
      color: #555;
    }

    #box-panel:empty { display: none; }

    .box-entry {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #141414;
      border: 1px solid #222;
      border-left: 2px solid #444;
      border-radius: 3px;
      padding: 3px 6px;
    }

    .box-entry + .box-entry {
      margin-left: 4px;
      padding-left: 10px;
      border-left: 2px solid #444;
    }

    .box-entry .box-name {
      color: #888;
      font-size: 10px;
      margin-right: 4px;
      white-space: nowrap;
    }

    .side-btn {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 2px;
      cursor: pointer;
      font-family: monospace;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #888;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }

    .side-btn[data-state="wall"]  { background: #2a1500; border-color: #ff6600; color: #ff6600; }
    .side-btn[data-state="null"]  { background: #141420; border-color: #6666aa; color: #aaaacc; }
    .side-btn[data-state="open"]  { background: #1a0000; border-color: #cc2222; color: #cc6666; }

    #coords {
      position: fixed;
      bottom: 6px;
      right: 10px;
      font-size: 11px;
      color: #444;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Life</h1>

  <button id="btn-play">&#9654; Play</button>
  <button id="btn-step">Step</button>
  <button id="btn-clear">Clear</button>
  <button id="btn-random">Pump</button>
  <input type="range" id="pump-strength" min="1" max="100" value="30" style="width:70px;accent-color:#cc6600;">
  <span id="pump-label" style="font-size:11px;color:#888;min-width:32px;">30%</span>

  <div id="sep"></div>

  <label>Speed</label>
  <input type="range" id="speed" min="1" max="60" value="15">

  <label>Zoom</label>
  <input type="range" id="zoom" min="4" max="32" value="10">

  <div id="sep"></div>

  <label>Pattern</label>
  <select id="patterns">
    <option value="">— insert —</option>
    <option value="glider">Glider</option>
    <option value="lwss">LWSS</option>
    <option value="blinker">Blinker</option>
    <option value="pulsar">Pulsar</option>
    <option value="gosper">Gosper Gun</option>
    <option value="rpentomino">R-pentomino</option>
  </select>

  <div id="sep"></div>
  <button id="btn-drawbox">Box</button>

  <div id="sep"></div>
  <label>Labels</label>
  <select id="label-select">
    <option value="alpha">Alpha (A, B…)</option>
    <option value="numeric">Numeric (1, 2…)</option>
    <option value="zero">Zero-based (0, 1…)</option>
    <option value="center">From centre (−n…0…+n)</option>
    <option value="hex">Hex (0x0, 0x1…)</option>
    <option value="binary">Binary (1, 10…)</option>
  </select>

  <div id="sep"></div>
  <label>Layers</label>
  <select id="layer-select">
    <option value="">— layers —</option>
    <option value="dividers">✓ Dividers</option>
    <option value="age">  Age</option>
    <option value="neighbors">  Neighbors</option>
    <option value="heatmap">  Heatmap</option>
    <option value="population">  Population</option>
    <option value="primes">✓ Primes</option>
    <option value="twinPrimes">  Twin Primes</option>
    <option value="fibonacci">  Fibonacci</option>
    <option value="squares">  Squares</option>
    <option value="tensHorizontal">  Tens Horizontal</option>
    <option value="tensVertical">  Tens Vertical</option>
    <option value="coords">  Coords</option>
    <option value="twinHorizontal">  Twin Horizontal</option>
    <option value="twinVertical">  Twin Vertical</option>
    <option value="primeBoxes">  Prime Boxes</option>
    <option value="twinBoxes">  Twin Boxes</option>
    <option value="fibBoxes">  Fibonacci Boxes</option>
    <option value="squareBoxes">  Square Boxes</option>
    <option value="tensBoxes">  Tens Boxes</option>
  </select>

  <div id="stats">
    <div>Gen <b id="gen">0</b></div>
    <div>Cells <b id="alive">0</b></div>
  </div>
</div>

<div id="seq-panel"></div>
<div id="box-panel"></div>
<canvas id="canvas"></canvas>
<div id="coords"></div>

<script>
// ── Excel column label (0→A, 1→B, 26→AA …) ────────────
function colLabel(n) {
  let s = '';
  n += 1;
  while (n > 0) { s = String.fromCharCode(65 + (n - 1) % 26) + s; n = Math.floor((n - 1) / 26); }
  return s;
}

// ── Config ─────────────────────────────────────────────
let CELL = 10;
const RULER = 30; // px reserved for axes
let cols, rows;
let grid, next;
let running = false;
let generation = 0;
let animId = null;
let lastTime = 0;
let fps = 15;
let pendingPattern = null;
let mouseCol = -1, mouseRow = -1;

// ── Walls ──────────────────────────────────────────────
// ── Draw-box tool ──────────────────────────────────────
let drawBoxMode = false;
let drawingBox = null;  // {c1,r1,c2,r2} in progress
const drawnBoxes = []; // {c1,r1,c2,r2,state,label}
let boxCounter = 0;
const boxLabelHits = []; // parallel array of {x,y,w,h} per box, updated each draw()
const boxSideHits = [];  // parallel array of {top,bottom,left,right} hit boxes per drawn box

function boxLabel(c1, r1, c2, r2) {
  const now = new Date();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const midCol = Math.floor(cols / 2), midRow = Math.floor(rows / 2);
  const tlC = Math.min(c1, c2) - midCol;
  const tlR = Math.min(r1, r2) - midRow;
  let n = boxCounter, letter = '';
  do { letter = String.fromCharCode(65 + (n % 26)) + letter; n = Math.floor(n / 26) - 1; } while (n >= 0);
  boxCounter++;
  return `${mm}-${dd}_(${tlC},${tlR})_${letter}`;
}

function renderSeqPanel() {
  const panel = document.getElementById('seq-panel');
  panel.innerHTML = '';
  for (const [name, meta] of Object.entries(seqMeta)) {
    const btn = document.createElement('button');
    btn.className = 'seq-btn';
    btn.dataset.state = seqHardness[name];
    btn.textContent = meta.label + ' — ' + seqHardness[name];
    btn.style.borderColor = seqHardness[name] === 'open' ? meta.color : '';
    btn.style.color       = seqHardness[name] === 'open' ? meta.color : '';
    if (seqHardness[name] === 'open') btn.style.background = '#111';
    btn.title = `${meta.label} hardness (click to cycle)`;
    btn.addEventListener('click', () => {
      seqHardness[name] = wallCycle[seqHardness[name]];
      applySeqHardness();
      renderSeqPanel();
      draw();
    });
    panel.appendChild(btn);
  }
}

function renderBoxPanel() {
  const panel = document.getElementById('box-panel');
  panel.innerHTML = '';
  drawnBoxes.forEach((box, i) => {
    const entry = document.createElement('div');
    entry.className = 'box-entry';
    // Left border gradient: top→left→bottom→right colors stacked
    const ct = stateColor[box.sides.top];
    const cr = stateColor[box.sides.right];
    const cb = stateColor[box.sides.bottom];
    const cl = stateColor[box.sides.left];
    entry.style.borderLeftColor = 'transparent';
    entry.style.borderLeft = 'none';
    entry.style.backgroundImage =
      `linear-gradient(#141414, #141414), linear-gradient(to bottom, ${ct}, ${cl}, ${cb}, ${cr})`;
    entry.style.backgroundClip = 'padding-box, border-box';
    entry.style.backgroundOrigin = 'padding-box, border-box';
    entry.style.border = '2px solid transparent';
    entry.style.borderRadius = '3px';

    const name = document.createElement('span');
    name.className = 'box-name';
    name.textContent = box.label;
    entry.appendChild(name);

    for (const side of ['top', 'right', 'bottom', 'left']) {
      const btn = document.createElement('button');
      btn.className = 'side-btn';
      btn.dataset.state = box.sides[side];
      btn.textContent = side[0].toUpperCase() + ':' + box.sides[side];
      btn.title = `${box.label} — ${side} side (click to cycle)`;
      btn.addEventListener('click', () => {
        drawnBoxes[i].sides[side] = wallCycle[drawnBoxes[i].sides[side]];
        applyBoxes();
        renderBoxPanel();
        draw();
      });
      entry.appendChild(btn);
    }

    panel.appendChild(entry);
  });
}

function applyBoxes() {
  drawnBoxes.forEach(box => {
    const c1 = Math.min(box.c1, box.c2), c2 = Math.max(box.c1, box.c2);
    const r1 = Math.min(box.r1, box.r2), r2 = Math.max(box.r1, box.r2);
    const sv = s => s === 'wall' ? 1 : s === 'null' ? 0 : null;
    const top = sv(box.sides.top), bot = sv(box.sides.bottom);
    const lft = sv(box.sides.left), rgt = sv(box.sides.right);
    if (top !== null) for (let c = c1; c <= c2; c++) set(c, r1, top);
    if (bot !== null) for (let c = c1; c <= c2; c++) set(c, r2, bot);
    if (lft !== null) for (let r = r1; r <= r2; r++) set(c1, r, lft);
    if (rgt !== null) for (let r = r1; r <= r2; r++) set(c2, r, rgt);
  });
}

function applySeqHardness() {
  const midCol = Math.floor(cols / 2);
  const midRow = Math.floor(rows / 2);
  const maxDist = Math.max(cols, rows);

  // Recompute sequences
  const sieve = new Uint8Array(maxDist + 1).fill(1);
  sieve[0] = sieve[1] = 0;
  for (let i = 2; i * i <= maxDist; i++) if (sieve[i]) for (let j = i*i; j <= maxDist; j += i) sieve[j] = 0;
  const primesArr = [];
  for (let i = 2; i <= maxDist; i++) if (sieve[i]) primesArr.push(i);
  const twinArr = primesArr.filter(p => (p+2 <= maxDist && sieve[p+2]) || (p-2 >= 2 && sieve[p-2]));
  const fibArr = []; let a = 1, b = 1;
  while (a <= maxDist) { if (a >= 2) fibArr.push(a); [a, b] = [b, a + b]; }
  const sqArr = [];
  for (let i = 1; i*i <= maxDist; i++) if (i*i >= 2) sqArr.push(i*i);
  const tensArr = [];
  for (let i = 10; i <= maxDist; i += 10) tensArr.push(i);

  const seqs = { primes: primesArr, twinPrimes: twinArr, fibonacci: fibArr, squares: sqArr, tens: tensArr };

  for (const [name, seq] of Object.entries(seqs)) {
    const state = seqHardness[name];
    if (state === 'open') continue;
    const val = state === 'wall' ? 1 : 0;
    seq.forEach(d => {
      [-1, 1].forEach(dir => {
        const c = midCol + dir * d;
        const r = midRow + dir * d;
        if (c >= 0 && c < cols) for (let row = 0; row < rows; row++) set(c, row, val);
        if (r >= 0 && r < rows) for (let col = 0; col < cols; col++) set(col, r, val);
      });
    });
  }
}

// states: 'open' | 'wall' | 'null'
const walls = { V: 'open', X: 'open', Y: 'open', Z: 'open' };
const wallCycle = { open: 'wall', wall: 'null', null: 'open' };
const stateColor = { open: '#cc2222', wall: '#ff6600', null: '#6666aa' };
let labelHits = {};

// ── Sequence hardness ───────────────────────────────────
const seqHardness = { primes: 'open', twinPrimes: 'open', fibonacci: 'open', squares: 'open', tens: 'open' };
const seqMeta = {
  primes:     { label: 'Primes',      color: '#9933cc' },
  twinPrimes: { label: 'Twin Primes', color: '#ccbb00' },
  fibonacci:  { label: 'Fibonacci',   color: '#ff9933' },
  squares:    { label: 'Squares',     color: '#33cccc' },
  tens:       { label: 'Tens',        color: '#88cc00' },
};

function applyWalls() {
  const midCol = Math.floor(cols / 2);
  const midRow = Math.floor(rows / 2);
  const seg = {
    V: (fn) => { for (let r = 0;      r < midRow; r++) fn(midCol, r); },
    X: (fn) => { for (let r = midRow; r < rows;   r++) fn(midCol, r); },
    Y: (fn) => { for (let c = 0;      c < midCol; c++) fn(c, midRow); },
    Z: (fn) => { for (let c = midCol; c < cols;   c++) fn(c, midRow); },
  };
  for (const [name, fn] of Object.entries(seg)) {
    if (walls[name] === 'wall') fn((c, r) => set(c, r, 1));
    if (walls[name] === 'null') fn((c, r) => set(c, r, 0));
  }
}

// ── Label mode ─────────────────────────────────────────
let labelMode = 'alpha';

function xLabel(c) {
  const mid = Math.floor(cols / 2);
  switch (labelMode) {
    case 'alpha':   return colLabel(c);
    case 'numeric': return String(c + 1);
    case 'zero':    return String(c);
    case 'center':  return String(c - mid);
    case 'hex':     return '0x' + c.toString(16).toUpperCase();
    case 'binary':  return c.toString(2);
    default:        return colLabel(c);
  }
}

function yLabel(r) {
  const mid = Math.floor(rows / 2);
  switch (labelMode) {
    case 'alpha':   return String(r + 1);
    case 'numeric': return String(r + 1);
    case 'zero':    return String(r);
    case 'center':  return String(r - mid);
    case 'hex':     return '0x' + r.toString(16).toUpperCase();
    case 'binary':  return r.toString(2);
    default:        return String(r + 1);
  }
}

// ── Layers ─────────────────────────────────────────────
const layers = { dividers: true, age: false, neighbors: false, heatmap: false, population: false, primes: true, twinPrimes: false, fibonacci: false, squares: false, tensHorizontal: false, tensVertical: false, coords: false, twinHorizontal: false, twinVertical: false, primeBoxes: false, twinBoxes: false, fibBoxes: false, squareBoxes: false, tensBoxes: false };
let ages; // Uint16Array — generations each cell has been alive
const popHistory = []; // population over time
const POP_HISTORY_LEN = 200;

// ── Canvas setup ───────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  cols = Math.floor((canvas.width  - RULER * 2) / CELL);
  rows = Math.floor((canvas.height - RULER * 2) / CELL);
  grid = new Uint8Array(cols * rows);
  next = new Uint8Array(cols * rows);
  ages = new Uint16Array(cols * rows);
  draw();
}

window.addEventListener('resize', resize);

// ── Grid helpers ───────────────────────────────────────
const idx = (c, r) => r * cols + c;

function get(c, r) {
  if (c < 0 || c >= cols || r < 0 || r >= rows) return 0;
  return grid[idx(c, r)];
}

function set(c, r, v) {
  if (c < 0 || c >= cols || r < 0 || r >= rows) return;
  grid[idx(c, r)] = v;
}

let pumpStrength = 0.3;

function randomize() {
  for (let i = 0; i < grid.length; i++)
    if (Math.random() < pumpStrength) { grid[i] = 1; ages[i] = ages[i] || 1; }
  applyWalls(); applyBoxes(); applySeqHardness();
  updateStats(); draw();
}

function clear() {
  grid.fill(0); ages.fill(0);
  generation = 0; popHistory.length = 0;
  applyWalls(); applyBoxes(); applySeqHardness();
  updateStats(); draw();
}

// ── Step ───────────────────────────────────────────────
function step() {
  next.fill(0);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let n =
        get(c-1,r-1) + get(c,r-1) + get(c+1,r-1) +
        get(c-1,r)               + get(c+1,r)   +
        get(c-1,r+1) + get(c,r+1) + get(c+1,r+1);
      let alive = grid[idx(c,r)];
      next[idx(c,r)] = alive ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
    }
  }
  // update ages
  for (let i = 0; i < grid.length; i++)
    ages[i] = next[i] ? (grid[i] ? Math.min(ages[i] + 1, 65535) : 1) : 0;
  [grid, next] = [next, grid];
  applyWalls();
  applyBoxes();
  applySeqHardness();
  generation++;
  updateStats();
}

// ── Draw ───────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const gx = RULER, gy = RULER; // grid origin

  const gridRight  = gx + cols * CELL;
  const gridBottom = gy + rows * CELL;
  const midX = gx + Math.floor(cols / 2) * CELL;
  const midY = gy + Math.floor(rows / 2) * CELL;

  // ── Box helper ──
  function drawBoxes(seq, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    seq.forEach(d => {
      const x = midX - d * CELL, y = midY - d * CELL;
      const w = d * CELL * 2,    h = d * CELL * 2;
      if (x >= gridRight || x + w <= gx || y >= gridBottom || y + h <= gy) return;
      ctx.strokeRect(
        Math.max(x, gx), Math.max(y, gy),
        Math.min(x + w, gridRight) - Math.max(x, gx),
        Math.min(y + h, gridBottom) - Math.max(y, gy)
      );
    });
  }

  // ── Full-grid line helper ──
  function drawGridLines(seq, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 0.75;
    seq.forEach(d => {
      [-1, 1].forEach(dir => {
        // vertical line at midX ± d*CELL
        const x = midX + dir * d * CELL;
        if (x > gx && x < gridRight) {
          ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gridBottom); ctx.stroke();
        }
        // horizontal line at midY ± d*CELL
        const y = midY + dir * d * CELL;
        if (y > gy && y < gridBottom) {
          ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gridRight, y); ctx.stroke();
        }
      });
    });
  }

  // ── Shared sequence marker helper ──
  function drawMarkers(seq, stroke, fill, tick = 5, labelBelow = false) {
    ctx.strokeStyle = stroke; ctx.fillStyle = fill;
    ctx.lineWidth = 1; ctx.font = '9px monospace';
    seq.forEach(d => {
      [-1, 1].forEach(dir => {
        let y = midY + dir * d * CELL;
        if (y > gy && y < gridBottom) {
          ctx.beginPath(); ctx.moveTo(midX - tick, y); ctx.lineTo(midX + tick, y); ctx.stroke();
          ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
          ctx.fillText((dir > 0 ? '+' : '−') + d, midX + tick + 3, y);
        }
        let x = midX + dir * d * CELL;
        if (x > gx && x < gridRight) {
          ctx.beginPath(); ctx.moveTo(x, midY - tick); ctx.lineTo(x, midY + tick); ctx.stroke();
          ctx.textAlign = 'center'; ctx.textBaseline = labelBelow ? 'bottom' : 'top';
          ctx.fillText((dir > 0 ? '+' : '−') + d, x, midY + (labelBelow ? -tick - 2 : tick + 2));
        }
      });
    });
  }

  // ── Precompute sequences ──
  const maxDist = Math.max(cols, rows);
  const sieve = new Uint8Array(maxDist + 1).fill(1);
  sieve[0] = sieve[1] = 0;
  for (let i = 2; i * i <= maxDist; i++) if (sieve[i]) for (let j = i*i; j <= maxDist; j += i) sieve[j] = 0;
  const primesSet = [];
  for (let i = 2; i <= maxDist; i++) if (sieve[i]) primesSet.push(i);

  const twinSet = primesSet.filter(p => (p + 2 <= maxDist && sieve[p + 2]) || (p - 2 >= 2 && sieve[p - 2]));

  const fibSet = [];
  let a = 1, b = 1;
  while (a <= maxDist) { if (a >= 2) fibSet.push(a); [a, b] = [b, a + b]; }

  const sqSet = [];
  for (let i = 1; i * i <= maxDist; i++) if (i * i >= 2) sqSet.push(i * i);

  const tensSet = [];
  for (let i = 10; i <= maxDist; i += 10) tensSet.push(i);

  // ── Rulers background ──
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, RULER);              // top
  ctx.fillRect(0, 0, RULER, canvas.height);             // left
  ctx.fillRect(gridRight, 0, RULER, canvas.height);     // right
  ctx.fillRect(0, gridBottom, canvas.width, RULER);     // bottom

  // Corners
  ctx.fillStyle = '#0e0e0e';
  ctx.fillRect(0, 0, RULER, RULER);
  ctx.fillRect(gridRight, 0, RULER, RULER);
  ctx.fillRect(0, gridBottom, RULER, RULER);
  ctx.fillRect(gridRight, gridBottom, RULER, RULER);

  // ── Crosshair highlight bands ──
  if (mouseCol >= 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(gx + mouseCol * CELL, gy, CELL, rows * CELL);
    ctx.fillRect(gx, gy + mouseRow * CELL, cols * CELL, CELL);
    // ruler highlights — all four sides
    ctx.fillStyle = 'rgba(77,189,116,0.25)';
    ctx.fillRect(gx + mouseCol * CELL, 0, CELL, RULER);                  // top
    ctx.fillRect(gx + mouseCol * CELL, gridBottom, CELL, RULER);         // bottom
    ctx.fillRect(0, gy + mouseRow * CELL, RULER, CELL);                  // left
    ctx.fillRect(gridRight, gy + mouseRow * CELL, RULER, CELL);          // right
  }

  // ── Grid lines ──
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= cols; c++) {
    let x = gx + c * CELL;
    ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let r = 0; r <= rows; r++) {
    let y = gy + r * CELL;
    ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // ── Cells ──
  ctx.fillStyle = '#4dbd74';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[idx(c, r)]) {
        ctx.fillRect(gx + c * CELL + 1, gy + r * CELL + 1, CELL - 1, CELL - 1);
      }
    }
  }

  // ── Layer: Age ──
  if (layers.age) {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        let a = ages[idx(c, r)];
        if (!a) continue;
        let t = Math.min(a / 80, 1);
        let R = Math.round(30  + t * 220);
        let G = Math.round(200 - t * 160);
        let B = Math.round(50  - t * 40);
        ctx.fillStyle = `rgba(${R},${G},${B},0.55)`;
        ctx.fillRect(gx + c * CELL + 1, gy + r * CELL + 1, CELL - 1, CELL - 1);
      }
    }
  }

  // ── Layer: Neighbors ──
  if (layers.neighbors && CELL >= 12) {
    ctx.font = `${Math.max(7, CELL - 5)}px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        let n = get(c-1,r-1)+get(c,r-1)+get(c+1,r-1)+get(c-1,r)+get(c+1,r)+get(c-1,r+1)+get(c,r+1)+get(c+1,r+1);
        if (n === 0) continue;
        ctx.fillStyle = n === 2 || n === 3 ? 'rgba(100,220,100,0.8)' : 'rgba(180,180,180,0.4)';
        ctx.fillText(n, gx + c * CELL + CELL / 2, gy + r * CELL + CELL / 2);
      }
    }
  }

  // ── Layer: Heatmap ──
  if (layers.heatmap) {
    const BLK = Math.max(4, Math.floor(Math.min(cols, rows) / 12));
    for (let br = 0; br < Math.ceil(rows / BLK); br++) {
      for (let bc = 0; bc < Math.ceil(cols / BLK); bc++) {
        let alive = 0, total = 0;
        for (let r = br*BLK; r < Math.min((br+1)*BLK, rows); r++)
          for (let c = bc*BLK; c < Math.min((bc+1)*BLK, cols); c++) { alive += grid[idx(c,r)]; total++; }
        let d = alive / total;
        if (d === 0) continue;
        let R = Math.round(d * 200), G = Math.round(30 + d * 60), B = Math.round(180 - d * 160);
        ctx.fillStyle = `rgba(${R},${G},${B},0.28)`;
        ctx.fillRect(gx + bc*BLK*CELL, gy + br*BLK*CELL, BLK*CELL, BLK*CELL);
      }
    }
  }

  // ── Layer: Population chart ──
  if (layers.population && popHistory.length > 1) {
    const cw = 160, ch = 60, cx2 = gridRight - cw - 6, cy2 = gridBottom - ch - 6;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(cx2, cy2, cw, ch);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    ctx.strokeRect(cx2, cy2, cw, ch);
    let maxP = Math.max(...popHistory, 1);
    ctx.strokeStyle = '#6af'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    popHistory.forEach((v, i) => {
      let px = cx2 + (i / (POP_HISTORY_LEN - 1)) * cw;
      let py = cy2 + ch - (v / maxP) * (ch - 4) - 2;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.stroke();
    ctx.fillStyle = '#6af'; ctx.font = '9px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('pop  max:' + maxP, cx2 + 4, cy2 + 3);
  }

  // ── Shared segment style (used by dividers and drawn boxes) ──
  const segStyle = { open: { color: '#cc2222', dash: [] }, wall: { color: '#ff6600', dash: [] }, null: { color: '#aaaacc', dash: [4, 3] } };

  // ── Layer: Dividers ──
  if (layers.dividers) {
  const interval = CELL >= 20 ? 1 : CELL >= 10 ? 5 : CELL >= 6 ? 10 : 20;
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Top ruler (columns)
  ctx.textAlign = 'center';
  for (let c = 0; c < cols; c++) {
    if (c % interval !== 0) continue;
    let x = gx + c * CELL + CELL / 2;
    let hi = c === mouseCol;
    ctx.strokeStyle = hi ? '#4dbd74' : '#333';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, RULER - 5); ctx.lineTo(x, RULER); ctx.stroke();
    ctx.fillStyle = hi ? '#4dbd74' : '#555';
    ctx.fillText(xLabel(c), x, RULER / 2);
  }

  // Bottom ruler (columns)
  for (let c = 0; c < cols; c++) {
    if (c % interval !== 0) continue;
    let x = gx + c * CELL + CELL / 2;
    let hi = c === mouseCol;
    ctx.strokeStyle = hi ? '#4dbd74' : '#333';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, gridBottom); ctx.lineTo(x, gridBottom + 5); ctx.stroke();
    ctx.fillStyle = hi ? '#4dbd74' : '#555';
    ctx.fillText(xLabel(c), x, gridBottom + RULER / 2);
  }

  // Left ruler (rows)
  ctx.textAlign = 'right';
  for (let r = 0; r < rows; r++) {
    if (r % interval !== 0) continue;
    let y = gy + r * CELL + CELL / 2;
    let hi = r === mouseRow;
    ctx.strokeStyle = hi ? '#4dbd74' : '#333';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(RULER - 5, y); ctx.lineTo(RULER, y); ctx.stroke();
    ctx.fillStyle = hi ? '#4dbd74' : '#555';
    ctx.fillText(yLabel(r), RULER - 7, y);
  }

  // Right ruler (rows)
  ctx.textAlign = 'left';
  for (let r = 0; r < rows; r++) {
    if (r % interval !== 0) continue;
    let y = gy + r * CELL + CELL / 2;
    let hi = r === mouseRow;
    ctx.strokeStyle = hi ? '#4dbd74' : '#333';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(gridRight, y); ctx.lineTo(gridRight + 5, y); ctx.stroke();
    ctx.fillStyle = hi ? '#4dbd74' : '#555';
    ctx.fillText(yLabel(r), gridRight + 7, y);
  }

  // Ruler border lines
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(RULER, 0);       ctx.lineTo(RULER, canvas.height);       ctx.stroke();
  ctx.beginPath(); ctx.moveTo(gridRight, 0);   ctx.lineTo(gridRight, canvas.height);   ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, RULER);       ctx.lineTo(canvas.width, RULER);        ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, gridBottom);  ctx.lineTo(canvas.width, gridBottom);   ctx.stroke();

  // ── Center dividers (styled per wall state) ──
  function drawSeg(x1, y1, x2, y2, state) {
    const s = segStyle[state];
    ctx.strokeStyle = s.color; ctx.lineWidth = 2;
    ctx.setLineDash(s.dash);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.setLineDash([]);
  }
  drawSeg(midX, gy,    midX, midY,       walls.V); // V: top half vertical
  drawSeg(midX, midY,  midX, gridBottom, walls.X); // X: bottom half vertical
  drawSeg(gx,   midY,  midX, midY,       walls.Y); // Y: left half horizontal
  drawSeg(midX, midY,  gridRight, midY,  walls.Z); // Z: right half horizontal

  // ── Divider labels (clickable walls) ──
  const pad = 6; const LW = 14, LH = 14;
  labelHits = {
    V: { x: midX + pad - LW/2,       y: gy + pad,              w: LW, h: LH },
    X: { x: midX + pad - LW/2,       y: gridBottom - pad - LH, w: LW, h: LH },
    Y: { x: gx + pad,                y: midY - pad - LH/2,     w: LW, h: LH },
    Z: { x: gridRight - pad - LW,    y: midY - pad - LH/2,     w: LW, h: LH },
  };
  ctx.font = 'bold 11px monospace';
  const wallColors = { open: null, wall: '#ff6600', null: '#333344' };
  const textColors = { open: '#cc2222', wall: '#ffffff', null: '#aaaacc' };
  Object.entries(labelHits).forEach(([name, box]) => {
    const state = walls[name];
    const bg = wallColors[state];
    if (bg) { ctx.fillStyle = bg; ctx.fillRect(box.x, box.y, box.w, box.h); }
    // outline for null state
    if (state === 'null') { ctx.strokeStyle = '#aaaacc'; ctx.lineWidth = 1; ctx.strokeRect(box.x, box.y, box.w, box.h); }
    ctx.fillStyle = textColors[state];
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(name, box.x + box.w / 2, box.y + box.h / 2);
  });

  ctx.globalAlpha = 1;
  } // end layers.dividers

  // ── Drawn boxes ──
  boxLabelHits.length = 0;
  drawnBoxes.forEach((box, i) => {
    const c1 = Math.min(box.c1, box.c2), c2 = Math.max(box.c1, box.c2);
    const r1 = Math.min(box.r1, box.r2), r2 = Math.max(box.r1, box.r2);
    const x = gx + c1 * CELL, y = gy + r1 * CELL;
    const w = (c2 - c1 + 1) * CELL, h = (r2 - r1 + 1) * CELL;
    const s = segStyle[box.state];

    // Each side drawn independently
    const sides = [
      { name: 'top',    x1: x,   y1: y,   x2: x+w, y2: y,   state: box.sides.top    },
      { name: 'bottom', x1: x,   y1: y+h, x2: x+w, y2: y+h, state: box.sides.bottom },
      { name: 'left',   x1: x,   y1: y,   x2: x,   y2: y+h, state: box.sides.left   },
      { name: 'right',  x1: x+w, y1: y,   x2: x+w, y2: y+h, state: box.sides.right  },
    ];
    sides.forEach(side => {
      const ss = segStyle[side.state];
      ctx.strokeStyle = ss.color; ctx.lineWidth = 2;
      ctx.setLineDash(ss.dash);
      ctx.beginPath(); ctx.moveTo(side.x1, side.y1); ctx.lineTo(side.x2, side.y2); ctx.stroke();
      ctx.setLineDash([]);
    });

    // Label chip (top-left corner of box)
    const LW = box.label.length * 7 + 6, LH = 14;
    const lx = x + 3, ly = y + 3;
    boxLabelHits[i] = { x: lx, y: ly, w: LW, h: LH };
    // Box name label (top-left corner) — always visible
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(lx, ly, LW, LH);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
    ctx.strokeRect(lx, ly, LW, LH);
    ctx.fillStyle = '#ccc'; ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(box.label, lx + LW / 2, ly + LH / 2);

    // Side indicator chips at midpoint of each side
    const SW = 12, SH = 12;
    const sideChips = [
      { key: 'top',    cx: x + w/2, cy: y,   state: box.sides.top    },
      { key: 'bottom', cx: x + w/2, cy: y+h, state: box.sides.bottom },
      { key: 'left',   cx: x,       cy: y+h/2, state: box.sides.left   },
      { key: 'right',  cx: x+w,     cy: y+h/2, state: box.sides.right  },
    ];
    if (!boxSideHits[i]) boxSideHits[i] = {};
    sideChips.forEach(chip => {
      const hx = chip.cx - SW/2, hy = chip.cy - SH/2;
      boxSideHits[i][chip.key] = { x: hx, y: hy, w: SW, h: SH };
      const bg2 = wallColors[chip.state];
      ctx.fillStyle = bg2 || '#1a1a1a'; ctx.fillRect(hx, hy, SW, SH);
      ctx.strokeStyle = segStyle[chip.state].color; ctx.lineWidth = 1;
      ctx.strokeRect(hx, hy, SW, SH);
    });
  });

  // ── In-progress box ──
  if (drawingBox) {
    const c1 = Math.min(drawingBox.c1, drawingBox.c2), c2 = Math.max(drawingBox.c1, drawingBox.c2);
    const r1 = Math.min(drawingBox.r1, drawingBox.r2), r2 = Math.max(drawingBox.r1, drawingBox.r2);
    const bx = gx + c1 * CELL, by = gy + r1 * CELL;
    const bw = (c2 - c1 + 1) * CELL, bh = (r2 - r1 + 1) * CELL;
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(bx, by, bw, bh);
    ctx.setLineDash([]);
    // Preview label
    const midCol = Math.floor(cols / 2), midRow = Math.floor(rows / 2);
    const previewLabel = `${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}_(${c1-midCol},${r1-midRow})`;
    const LW = previewLabel.length * 7 + 6, LH = 14;
    ctx.fillStyle = 'rgba(40,40,40,0.85)';
    ctx.fillRect(bx + 3, by + 3, LW, LH);
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
    ctx.strokeRect(bx + 3, by + 3, LW, LH);
    ctx.fillStyle = '#ddd'; ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(previewLabel, bx + 3 + LW / 2, by + 3 + LH / 2);
  }

  // ── Layer: Primes (purple) ──
  if (layers.primes) {
    drawGridLines(primesSet, 'rgba(153,51,204,0.15)');
    drawMarkers(primesSet, '#9933cc', '#bb66ff', 5);
  }

  // ── Layer: Twin Primes (yellow) ──
  if (layers.twinPrimes) {
    drawGridLines(twinSet, 'rgba(255,238,68,0.15)');
    drawMarkers(twinSet, '#bbaa00', '#ffee44', 7, true);
  }

  // ── Layer: Fibonacci (orange) ──
  if (layers.fibonacci) {
    drawGridLines(fibSet, 'rgba(255,153,51,0.15)');
    drawMarkers(fibSet, '#cc6600', '#ff9933', 6);
  }

  // ── Layer: Perfect Squares (cyan) ──
  if (layers.squares) {
    drawGridLines(sqSet, 'rgba(51,204,255,0.15)');
    drawMarkers(sqSet, '#007799', '#33ccff', 4, true);
  }

  // ── Layer: Tens Horizontal / Vertical ──
  if (layers.tensHorizontal) {
    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(170,255,0,0.55)';
    tensSet.forEach(d => {
      [-1, 1].forEach(dir => {
        const x = midX + dir * d * CELL;
        if (x <= gx || x >= gridRight) return;
        ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gridBottom); ctx.stroke();
      });
    });
    drawMarkers(tensSet, '#448800', '#aaff00', 8);
  }

  if (layers.tensVertical) {
    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(170,255,0,0.55)';
    tensSet.forEach(d => {
      [-1, 1].forEach(dir => {
        const y = midY + dir * d * CELL;
        if (y <= gy || y >= gridBottom) return;
        ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gridRight, y); ctx.stroke();
      });
    });
    drawMarkers(tensSet, '#448800', '#aaff00', 8);
  }

  // ── Layer: Coords ──
  if (layers.coords && CELL >= 14) {
    ctx.font = `${Math.max(7, Math.floor(CELL * 0.4))}px monospace`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        ctx.fillStyle = grid[idx(c, r)] ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.18)';
        ctx.fillText(xLabel(c) + yLabel(r), gx + c * CELL + 2, gy + r * CELL + 2);
      }
    }
  }

  // ── Box layers ──
  if (layers.primeBoxes)  drawBoxes(primesSet, 'rgba(153,51,204,0.5)');
  if (layers.twinBoxes)   drawBoxes(twinSet,   'rgba(255,220,40,0.5)');
  if (layers.fibBoxes)    drawBoxes(fibSet,    'rgba(255,153,51,0.5)');
  if (layers.squareBoxes) drawBoxes(sqSet,     'rgba(51,204,255,0.5)');
  if (layers.tensBoxes)   drawBoxes(tensSet,   'rgba(170,255,0,0.5)');

  // ── Layer: Twin Horizontal ──
  // Vertical lines (up/down) at each twin prime distance along the horizontal axis
  if (layers.twinHorizontal && twinSet.length) {
    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255,220,40,0.55)';
    twinSet.forEach(d => {
      [-1, 1].forEach(dir => {
        const x = midX + dir * d * CELL;
        if (x <= gx || x >= gridRight) return;
        ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gridBottom); ctx.stroke();
      });
    });
  }

  // ── Layer: Twin Vertical ──
  // Horizontal lines (left/right) at each twin prime distance along the vertical axis
  if (layers.twinVertical && twinSet.length) {
    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255,220,40,0.55)';
    twinSet.forEach(d => {
      [-1, 1].forEach(dir => {
        const y = midY + dir * d * CELL;
        if (y <= gy || y >= gridBottom) return;
        ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gridRight, y); ctx.stroke();
      });
    });
  }

}

// ── Loop ───────────────────────────────────────────────
function loop(ts) {
  if (!running) return;
  animId = requestAnimationFrame(loop);
  let interval = 1000 / fps;
  if (ts - lastTime < interval) return;
  lastTime = ts;
  step();
  draw();
}

function play() {
  running = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('btn-play').classList.add('active');
  animId = requestAnimationFrame(loop);
}

function pause() {
  running = false;
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('active');
  if (animId) cancelAnimationFrame(animId);
}

function togglePlay() { running ? pause() : play(); }

// ── Stats ──────────────────────────────────────────────
function updateStats() {
  document.getElementById('gen').textContent = generation;
  let count = 0;
  for (let i = 0; i < grid.length; i++) count += grid[i];
  document.getElementById('alive').textContent = count;
  popHistory.push(count);
  if (popHistory.length > POP_HISTORY_LEN) popHistory.shift();
}

// ── Mouse drawing ──────────────────────────────────────
let painting = false;
let paintValue = 1;

canvas.addEventListener('click', e => {
  if (drawBoxMode) return;
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;

  // Check V/X/Y/Z label hits
  for (const [name, box] of Object.entries(labelHits)) {
    if (cx >= box.x && cx <= box.x + box.w && cy >= box.y && cy <= box.y + box.h) {
      walls[name] = wallCycle[walls[name]];
      applyWalls();
      draw();
      return;
    }
  }

  // Check drawn box side chip hits — cycle individual side state
  for (let i = 0; i < drawnBoxes.length; i++) {
    const sideHits = boxSideHits[i];
    if (sideHits) {
      for (const side of ['top', 'bottom', 'left', 'right']) {
        const hit = sideHits[side];
        if (hit && cx >= hit.x && cx <= hit.x + hit.w && cy >= hit.y && cy <= hit.y + hit.h) {
          drawnBoxes[i].sides[side] = wallCycle[drawnBoxes[i].sides[side]];
          applyBoxes();
          renderBoxPanel();
          draw();
          return;
        }
      }
    }
  }

  // Check drawn box label hits — cycle all sides at once
  for (let i = 0; i < drawnBoxes.length; i++) {
    const hit = boxLabelHits[i];
    if (hit && cx >= hit.x && cx <= hit.x + hit.w && cy >= hit.y && cy <= hit.y + hit.h) {
      const next = wallCycle[drawnBoxes[i].sides.top];
      drawnBoxes[i].sides.top = next;
      drawnBoxes[i].sides.bottom = next;
      drawnBoxes[i].sides.left = next;
      drawnBoxes[i].sides.right = next;
      applyBoxes();
      renderBoxPanel();
      draw();
      return;
    }
  }
});

canvas.addEventListener('mousedown', e => {
  if (drawBoxMode) {
    const [c, r] = mouseCell(e);
    drawingBox = { c1: c, r1: r, c2: c, r2: r };
    return;
  }
  if (pendingPattern) {
    insertPattern(pendingPattern, ...mouseCell(e));
    pendingPattern = null;
    document.getElementById('patterns').value = '';
    draw();
    return;
  }
  painting = true;
  let [c, r] = mouseCell(e);
  paintValue = get(c, r) ? 0 : 1;
  set(c, r, paintValue);
  updateStats();
  draw();
});

canvas.addEventListener('mousemove', e => {
  let [c, r] = mouseCell(e);
  mouseCol = c; mouseRow = r;
  document.getElementById('coords').textContent =
    (c >= 0 && r >= 0 && c < cols && r < rows) ? `${colLabel(c)}${r + 1}` : '';
  if (drawingBox) { drawingBox.c2 = c; drawingBox.r2 = r; }
  else if (painting) { set(c, r, paintValue); updateStats(); }
  draw();
});

canvas.addEventListener('mouseup', e => {
  if (drawingBox) {
    const [c, r] = mouseCell(e);
    drawingBox.c2 = c; drawingBox.r2 = r;
    if (drawingBox.c1 !== drawingBox.c2 || drawingBox.r1 !== drawingBox.r2) {
      drawnBoxes.push({ ...drawingBox, sides: { top: 'wall', bottom: 'wall', left: 'wall', right: 'wall' }, label: boxLabel(drawingBox.c1, drawingBox.r1, drawingBox.c2, drawingBox.r2) });
      applyBoxes();
      renderBoxPanel();
    }
    drawingBox = null;
    draw();
    return;
  }
  painting = false;
});
canvas.addEventListener('mouseleave', () => {
  painting = false;
  mouseCol = -1; mouseRow = -1;
  document.getElementById('coords').textContent = '';
  draw();
});

function mouseCell(e) {
  let rect = canvas.getBoundingClientRect();
  return [
    Math.floor((e.clientX - rect.left  - RULER) / CELL),
    Math.floor((e.clientY - rect.top - RULER) / CELL)
  ];
}

// ── Patterns ───────────────────────────────────────────
const PATTERNS = {
  glider:    [[0,1],[1,2],[2,0],[2,1],[2,2]],
  blinker:   [[0,1],[1,1],[2,1]],
  lwss:      [[1,0],[4,0],[0,1],[0,2],[4,2],[0,3],[1,3],[2,3],[3,3]],
  rpentomino:[[1,0],[2,0],[0,1],[1,1],[1,2]],
  pulsar: (() => {
    let cells = [];
    const cols = [[2,3,4],[8,9,10]];
    const rows2 = [[0,5,7,12],[0,5,7,12]];
    // pulsar is symmetric, build manually
    const p = [
      [2,0],[3,0],[4,0],[8,0],[9,0],[10,0],
      [0,2],[5,2],[7,2],[12,2],[0,3],[5,3],[7,3],[12,3],[0,4],[5,4],[7,4],[12,4],
      [2,5],[3,5],[4,5],[8,5],[9,5],[10,5],
      [2,7],[3,7],[4,7],[8,7],[9,7],[10,7],
      [0,8],[5,8],[7,8],[12,8],[0,9],[5,9],[7,9],[12,9],[0,10],[5,10],[7,10],[12,10],
      [2,12],[3,12],[4,12],[8,12],[9,12],[10,12]
    ];
    return p;
  })(),
  gosper: [
    [0,4],[0,5],[1,4],[1,5],
    [10,4],[10,5],[10,6],[11,3],[11,7],[12,2],[12,8],[13,2],[13,8],
    [14,5],[15,3],[15,7],[16,4],[16,5],[16,6],[17,5],
    [20,2],[20,3],[20,4],[21,2],[21,3],[21,4],[22,1],[22,5],[24,0],[24,1],[24,5],[24,6],
    [34,2],[34,3],[35,2],[35,3]
  ]
};

function insertPattern(name, atC, atR) {
  let cells = PATTERNS[name];
  if (!cells) return;
  cells.forEach(([dc, dr]) => set(atC + dc, atR + dr, 1));
  updateStats();
}

document.getElementById('patterns').addEventListener('change', e => {
  pendingPattern = e.target.value || null;
  canvas.style.cursor = pendingPattern ? 'copy' : 'crosshair';
});

// ── Controls ───────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', togglePlay);

document.getElementById('btn-step').addEventListener('click', () => {
  pause();
  step();
  draw();
});

document.getElementById('btn-clear').addEventListener('click', () => { pause(); clear(); });
document.getElementById('btn-random').addEventListener('click', () => randomize());

document.getElementById('pump-strength').addEventListener('input', e => {
  pumpStrength = +e.target.value / 100;
  document.getElementById('pump-label').textContent = e.target.value + '%';
});

document.getElementById('speed').addEventListener('input', e => {
  fps = +e.target.value;
});

document.getElementById('zoom').addEventListener('input', e => {
  CELL = +e.target.value;
  resize();
});

// ── Keyboard ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight' || e.key === '.') { pause(); step(); draw(); }
  if (e.key === 'c') { pause(); clear(); }
  if (e.key === 'r') { pause(); randomize(); }
});

// ── Draw-box button ────────────────────────────────────
document.getElementById('btn-drawbox').addEventListener('click', () => {
  drawBoxMode = !drawBoxMode;
  document.getElementById('btn-drawbox').classList.toggle('active', drawBoxMode);
  canvas.style.cursor = drawBoxMode ? 'crosshair' : 'crosshair';
});

// ── Label mode toggle ──────────────────────────────────
document.getElementById('label-select').addEventListener('change', e => {
  labelMode = e.target.value;
  draw();
});

// ── Layer toggles ──────────────────────────────────────
const layerNames = { dividers: 'Dividers', age: 'Age', neighbors: 'Neighbors', heatmap: 'Heatmap', population: 'Population', primes: 'Primes', twinPrimes: 'Twin Primes', fibonacci: 'Fibonacci', squares: 'Squares', tensHorizontal: 'Tens Horizontal', tensVertical: 'Tens Vertical', coords: 'Coords', twinHorizontal: 'Twin Horizontal', twinVertical: 'Twin Vertical', primeBoxes: 'Prime Boxes', twinBoxes: 'Twin Boxes', fibBoxes: 'Fibonacci Boxes', squareBoxes: 'Square Boxes', tensBoxes: 'Tens Boxes' };

function refreshLayerSelect() {
  const sel = document.getElementById('layer-select');
  [...sel.options].forEach(opt => {
    if (!opt.value) return;
    opt.text = (layers[opt.value] ? '✓ ' : '  ') + layerNames[opt.value];
  });
}

document.getElementById('layer-select').addEventListener('change', e => {
  const key = e.target.value;
  if (!key) return;
  layers[key] = !layers[key];
  refreshLayerSelect();
  e.target.value = '';
  draw();
});

// ── Init ───────────────────────────────────────────────
resize();
randomize();
renderSeqPanel();
</script>
